server:
  listen: ":8080"
  read_timeout: "30s"
  write_timeout: "120s"

storage:
  backend: sqlite
  sqlite:
    path: /data/luner.db

providers:
  - name: mock-llm
    base_url: http://mock-llm:19999
    api_key: demo-key
    timeout: 15s
    models:
      - gpt-4o-mini
      - gpt-4o

logging:
  level: info
