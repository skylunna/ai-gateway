name: luner-demo

services:
  mock-llm:
    image: python:3.11-slim
    container_name: luner-demo-mock-llm
    command: python /mock_llm.py
    volumes:
      - ./mock_llm.py:/mock_llm.py:ro
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:19999/health', timeout=2)"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - luner-demo
    restart: unless-stopped

  luner:
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: luner-demo
    ports:
      - "8080:8080"
      - "9090:9090"
    volumes:
      - ./config.demo.yaml:/etc/luner/config.yaml:ro
      - luner-demo-data:/data
    depends_on:
      mock-llm:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - luner-demo
    restart: unless-stopped

  seed-data:
    image: python:3.11-slim
    container_name: luner-demo-seed
    command: python /seed-data.py
    volumes:
      - ./seed-data.py:/seed-data.py:ro
    environment:
      - LUNER_URL=http://luner:8080
    depends_on:
      luner:
        condition: service_healthy
    networks:
      - luner-demo
    restart: "no"

volumes:
  luner-demo-data:
    driver: local

networks:
  luner-demo:
    driver: bridge
