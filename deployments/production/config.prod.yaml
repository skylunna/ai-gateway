server:
  listen: ":8080"
  read_timeout: "30s"
  write_timeout: "120s"

storage:
  backend: sqlite
  sqlite:
    path: /data/luner.db

providers:
  - name: openai
    base_url: https://api.openai.com
    api_key: ${OPENAI_API_KEY}
    timeout: 30s
    models:
      - gpt-4o
      - gpt-4o-mini
      - gpt-3.5-turbo

  # - name: anthropic
  #   base_url: https://api.anthropic.com
  #   api_key: ${ANTHROPIC_API_KEY}
  #   timeout: 30s
  #   models:
  #     - claude-opus-4-5
  #     - claude-sonnet-4-6

cache:
  enabled: true
  max_items: 5000
  default_ttl: 2h

rate_limit:
  enabled: true
  providers:
    - name: openai
      qps: 10.0
      burst: 20

logging:
  level: info
