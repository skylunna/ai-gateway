server:
  listen: ":8080"
  read_timeout: "30s"
  write_timeout: "120s"

storage:
  backend: sqlite
  sqlite:
    path: /data/luner.db       # 持久化数据（traces、policies）

providers:
  - name: qwen
    base_url: https://dashscope.aliyuncs.com/compatible-mode
    api_key: ${DASHSCOPE_API_KEY}
    timeout: 30s
    models:
      - qwen-turbo
      - qwen-plus
      - qwen-max

  # - name: openai
  #   base_url: https://api.openai.com
  #   api_key: ${OPENAI_API_KEY}
  #   timeout: 30s
  #   models:
  #     - gpt-4o
  #     - gpt-4o-mini

cache:
  enabled: true
  max_items: 5000
  default_ttl: 2h        # temperature=0 的请求命中缓存后不再调用上游

rate_limit:
  enabled: true
  providers:
    - name: qwen
      qps: 10.0
      burst: 20