name: Auto Format

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  format:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Format Go code
        run: gofmt -w -s .

      - name: Update go mod
        run: go mod tidy

      - uses: EndBug/add-and-commit@v9
        with:
          message: "chore: format code & tidy mod"