version: v1
server:
  listen: ":8080"
  read_timeout: "30s"
  write_timeout: "120s"

providers:
  - name: qwen-online
    base_url: "https://dashscope.aliyuncs.com/compatible-mode"
    api_key: "${OPENAI_API_KEY}"
    models: ["qwen-turbo", "qwen-plus", "qwen-max"]
    timeout: "30s"

cache:
  enabled: true
  max_items: 5000
  default_ttl: "2h"

# storage: persistent backend for spans, tenants, api keys, and policies.
# Leave backend empty (or omit this section) to disable storage.
storage:
  backend: sqlite       # sqlite | "" (disabled)
  sqlite:
    path: luner.db

rate_limit:
  enabled: true
  providers:
    - name: qwen-online
      qps: 2.0
      burst: 1